transforms:
  - !RenameRegisters
    block: .*
    from: ^SAI_(.+)$
    to: $1
  - !Rename
    from: ^SAI\d$
    to: SAI
    type: Block
  - !Rename
    from: ^SAI_(.+)
    to: $1
    type: All
  - !MergeEnums
    from: ^[AB](.*)
    to: $1
  - !Rename
    from: ^(.+?)_(.+)
    to: $2
    type: All
  # Drop placeholder enums (SVD uses unhelpful B_0x variant names).
  - !DeleteEnums
    from: .*
  - !MergeFieldsets
    from: ^[AB](.*)
    to: $1
  - !MakeFieldArray
    fieldsets: PDMCR
    from: CKEN\d
    to: CKEN
  - !MakeFieldArray
    fieldsets: PDMDLY
    from: DLYM\d(L|R)
    to: DLYM$1
  - !MakeBlock
    blocks: SAI
    from: ^(A|B)(.+)
    to_outer: $1
    to_inner: $2
    to_block: CH
  - !MakeRegisterArray
    blocks: SAI
    from: ^(A|B)$
    to: CH
