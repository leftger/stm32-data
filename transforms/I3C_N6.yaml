transforms:
  - !Rename
    from: ^I3C\d$
    to: I3C
    type: Block
  - !RenameRegisters
    block: .*
    from: ^I3C_(.+)$
    to: $1
  - !Rename
    from: ^I3C_(.+)$
    to: $1
    type: Fieldset
  - !RenameRegisters
    block: .*
    from: ^(.+)_alternate$
    to: ${1}_ALTERNATE
  - !Rename
    from: ^(.+)_alternate$
    to: ${1}_ALTERNATE
    type: Fieldset
  - !DeleteEnums
    from: .*
