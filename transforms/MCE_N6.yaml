transforms:
  - !DeleteEnums
    from: .*
  - !Rename
    from: ^MCE\d$
    to: MCE
    type: Block
  - !RenameRegisters
    block: .*
    from: ^MCE_(.+)$
    to: $1
  - !Rename
    from: ^MCE_(.+)$
    to: $1
    type: Fieldset
  - !MakeFieldArray
    fieldsets: (MKEYR|FMKEYR|CC1KEYR|CC2KEYR)\d+
    from: (M|FM)?KEY\d+
    to: ${1}KEY
  - !MergeFieldsets
    from: MKEYR\d+
    to: MKEYR
    main: MKEYR0
  - !MergeFieldsets
    from: REGCR\d+
    to: REGCR
    main: REGCR1
  - !MergeFieldsets
    from: SADDR\d+
    to: SADDR
    main: SADDR1
  - !MergeFieldsets
    from: EADDR\d+
    to: EADDR
    main: EADDR1
  - !MergeFieldsets
    from: FMKEYR\d+
    to: FMKEYR
    main: FMKEYR0
  - !MergeFieldsets
    from: CC1KEYR\d+
    to: CC1KEYR
    main: CC1KEYR0
  - !MergeFieldsets
    from: CC2KEYR\d+
    to: CC2KEYR
    main: CC2KEYR0
  - !MergeFieldsets
    from: CC1NR\d+
    to: CC1NR
    main: CC1NR0
  - !MergeFieldsets
    from: CC2NR\d+
    to: CC2NR
    main: CC2NR0
  - !MakeRegisterArray
    blocks: MCE
    from: REGCR\d+
    to: REGCR
  - !MakeRegisterArray
    blocks: MCE
    from: SADDR\d+
    to: SADDR
  - !MakeRegisterArray
    blocks: MCE
    from: EADDR\d+
    to: EADDR
  - !MakeRegisterArray
    blocks: MCE
    from: MKEYR\d+
    to: MKEYR
  - !MakeRegisterArray
    blocks: MCE
    from: FMKEYR\d+
    to: FMKEYR
  - !MakeRegisterArray
    blocks: MCE
    from: CC1KEYR\d+
    to: CC1KEYR
  - !MakeRegisterArray
    blocks: MCE
    from: CC2KEYR\d+
    to: CC2KEYR
  - !MakeRegisterArray
    blocks: MCE
    from: CC1NR\d+
    to: CC1NR
  - !MakeRegisterArray
    blocks: MCE
    from: CC2NR\d+
    to: CC2NR
