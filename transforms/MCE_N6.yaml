transforms:
  - !DeleteEnums
    from: .*
  - !Rename
    from: ^MCE\d$
    to: MCE
    type: Block
  - !RenameRegisters
    block: .*
    from: ^MCE_(.+)$
    to: $1
  - !Rename
    from: ^MCE_(.+)$
    to: $1
    type: Fieldset
  - !MergeFieldsets
    from: REGCR\d+
    to: REGCR
    main: REGCR1
  - !MergeFieldsets
    from: SADDR\d+
    to: SADDR
    main: SADDR1
  - !MergeFieldsets
    from: EADDR\d+
    to: EADDR
    main: EADDR1
  - !MakeRegisterArray
    blocks: MCE
    from: REGCR\d+
    to: REGCR
  - !MakeRegisterArray
    blocks: MCE
    from: SADDR\d+
    to: SADDR
  - !MakeRegisterArray
    blocks: MCE
    from: EADDR\d+
    to: EADDR
