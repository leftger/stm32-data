transforms:
  - !RenameRegisters
    block: .*
    from: ^ADF_(.+)$
    to: $1
  - !Rename
    from: ^ADF_(.+)$
    to: $1
    type: Fieldset
  - !RenameRegisters
    block: .*
    from: ^(SITF|BSMX|DFLT|DLY)(\d+)(.+)$
    to: $1$3
  - !Rename
    from: ^(SITF|BSMX|DFLT|DLY)(\d+)(.+)$
    to: $1$3
    type: Fieldset
  - !DeleteEnums
    from: .*
    bit_size: 1
