transforms:
  - !RenameRegisters
    block: .*
    from: ^SPDIFRX_(.+)$
    to: $1
  - !Rename
    from: ^SPDIFRX_(.+)$
    to: $1
    type: Fieldset
  - !DeleteRegisters
    block: .*
    from: FMT[12]_DR
  - !DeleteFieldsets
    from: FMT[12]_DR
  - !RenameRegisters
    block: .*
    from: FMT0_DR
    to: DR
  - !Rename
    from: FMT0_DR
    to: DR
    type: Fieldset
  - !DeleteEnums
    from: .*
    bit_size: 1
