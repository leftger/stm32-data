transforms:
  - !RenameRegisters
    block: .*
    from: ^MDF_(.+)$
    to: $1
  - !Rename
    from: ^MDF_(.+)$
    to: $1
    type: Fieldset
  - !MergeFieldsets
    from: DFLT\d+CICR
    to: DFLTCICR
    main: DFLT0CICR
  - !MergeFieldsets
    from: DFLT\d+CR
    to: DFLTCR
    main: DFLT0CR
  - !MergeFieldsets
    from: DFLT\d+DR
    to: DFLTDR
    main: DFLT0DR
  - !MergeFieldsets
    from: DFLT\d+IER
    to: DFLTIER
    main: DFLT0IER
  - !MergeFieldsets
    from: DFLT\d+INTR
    to: DFLTINTR
    main: DFLT0INTR
  - !MergeFieldsets
    from: DFLT\d+ISR
    to: DFLTISR
    main: DFLT0ISR
  - !MergeFieldsets
    from: DFLT\d+RSFR
    to: DFLTRSFR
    main: DFLT0RSFR
  - !MergeFieldsets
    from: BSMX\d+CR
    to: BSMXCR
    main: BSMX0CR
  - !MergeFieldsets
    from: SITF\d+CR
    to: SITFCR
    main: SITF0CR
  - !MergeFieldsets
    from: OLD\d+CR
    to: OLDCR
    main: OLD0CR
  - !MergeFieldsets
    from: OLD\d+THLR
    to: OLDTHLR
    main: OLD0THLR
  - !MergeFieldsets
    from: OLD\d+THHR
    to: OLDTHHR
    main: OLD0THHR
  - !MergeFieldsets
    from: DLY\d+CR
    to: DLYCR
    main: DLY0CR
  - !MergeFieldsets
    from: SCD\d+CR
    to: SCDCR
    main: SCD0CR
  - !MergeFieldsets
    from: OEC\d+CR
    to: OECCR
    main: OEC0CR
  - !MergeFieldsets
    from: SNPS\d+DR
    to: SNPSDR
    main: SNPS0DR
  - !MakeRegisterArray
    blocks: .*
    from: DFLT\d+CICR
    to: DFLTCICR
  - !MakeRegisterArray
    blocks: .*
    from: DFLT\d+CR
    to: DFLTCR
  - !MakeRegisterArray
    blocks: .*
    from: DFLT\d+DR
    to: DFLTDR
  - !MakeRegisterArray
    blocks: .*
    from: DFLT\d+IER
    to: DFLTIER
  - !MakeRegisterArray
    blocks: .*
    from: DFLT\d+INTR
    to: DFLTINTR
  - !MakeRegisterArray
    blocks: .*
    from: DFLT\d+ISR
    to: DFLTISR
  - !MakeRegisterArray
    blocks: .*
    from: DFLT\d+RSFR
    to: DFLTRSFR
  - !MakeRegisterArray
    blocks: .*
    from: BSMX\d+CR
    to: BSMXCR
  - !MakeRegisterArray
    blocks: .*
    from: SITF\d+CR
    to: SITFCR
  - !MakeRegisterArray
    blocks: .*
    from: OLD\d+CR
    to: OLDCR
  - !MakeRegisterArray
    blocks: .*
    from: OLD\d+THLR
    to: OLDTHLR
  - !MakeRegisterArray
    blocks: .*
    from: OLD\d+THHR
    to: OLDTHHR
  - !MakeRegisterArray
    blocks: .*
    from: DLY\d+CR
    to: DLYCR
  - !MakeRegisterArray
    blocks: .*
    from: SCD\d+CR
    to: SCDCR
  - !MakeRegisterArray
    blocks: .*
    from: OEC\d+CR
    to: OECCR
  - !MakeRegisterArray
    blocks: .*
    from: SNPS\d+DR
    to: SNPSDR
