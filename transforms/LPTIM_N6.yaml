transforms:
  - !Rename
    from: ^LPTIM\d$
    to: LPTIM_Adv
    type: Block
  - !RenameRegisters
    block: .*
    from: ^LPTIM\d+_(.+)$
    to: $1
  - !Rename
    from: ^LPTIM\d+_(.+)$
    to: $1
    type: Fieldset
  - !RenameRegisters
    block: LPTIM_Adv
    from: (.*)intput
    to: ${1}input
  - !Rename
    from: (.*)intput
    to: ${1}input
    type: All
  - !MakeBlock
    blocks: ^LPTIM_Adv$
    from: ^(.+)_output$
    to_outer: Output
    to_block: Output
    to_inner: ${1}
  - !MakeBlock
    blocks: ^LPTIM_Adv$
    from: ^(.+)_input$
    to_outer: Input
    to_block: Input
    to_inner: ${1}
  - !RenameFields
    fieldset: CCR\d
    from: CCR\d
    to: CCR
  - !MergeFieldsets
    from: CCR\d
    to: CCR
  - !MakeRegisterArray
    blocks: LPTIM_Adv
    from: CCR\d
    to: CCR
  - !MakeFieldArray
    fieldsets: CFGR2
    from: (I[CN])\d(SEL)
    to: $1$2
  - !MakeFieldArray
    fieldsets: CCMR\d
    from: (.*)\d(.*)
    to: $1$2
  - !MakeFieldArray
    fieldsets: (ISR|ICR|DIER).*
    from: (.*)\d(.*)
    to: $1$2
  - !Rename
    from: ^LPTIM_Adv$
    to: LPTIM
    type: Block
  - !DeleteEnums
    from: .*
