block/ADC_COMMON:
  description: ADC common registers
  items:
  - name: CSR
    description: common status register
    byte_offset: 0
    access: Read
    fieldset: CSR
  - name: CCR
    description: common control register
    byte_offset: 8
    fieldset: CCR
  - name: CDR
    description: common regular data register for dual mode
    byte_offset: 12
    access: Read
    fieldset: CDR
  - name: CDR2
    description: common regular data register for dual mode
    byte_offset: 16
    access: Read
    fieldset: CDR2
fieldset/CCR:
  description: common control register
  fields:
  - name: DUAL
    description: Dual ADC mode selection.
    bit_offset: 0
    bit_size: 5
    enum: DUAL
  - name: DELAY
    description: Delay between two sampling phases.
    bit_offset: 8
    bit_size: 4
  - name: DAMDF
    description: Dual ADC mode data format.
    bit_offset: 14
    bit_size: 2
    enum: DAMDF
  - name: VREFEN
    description: Vless thansub>REFINTless than/sub> enable.
    bit_offset: 22
    bit_size: 1
  - name: TSEN
    description: Temperature sensor voltage enable.
    bit_offset: 23
    bit_size: 1
fieldset/CDR:
  description: common regular data register for dual mode.
  fields:
  - name: RDATA_MST
    description: Regular data of the master ADC.
    bit_offset: 0
    bit_size: 16
  - name: RDATA_SLV
    description: Regular data of the slave ADC.
    bit_offset: 16
    bit_size: 16
fieldset/CDR2:
  description: common regular data register for dual mode.
  fields:
  - name: RDATA_ALT
    description: Regular data of the master/slave alternated ADCs.
    bit_offset: 0
    bit_size: 32
fieldset/CSR:
  description: common status register
  fields:
  - name: ADRDY_MST
    description: Master ADC ready
    bit_offset: 0
    bit_size: 1
  - name: EOSMP_MST
    description: End of Sampling phase flag of the master ADC
    bit_offset: 1
    bit_size: 1
  - name: EOC_MST
    description: End of regular conversion of the master ADC
    bit_offset: 2
    bit_size: 1
  - name: EOS_MST
    description: End of regular sequence flag of the master ADC
    bit_offset: 3
    bit_size: 1
  - name: OVR_MST
    description: Overrun flag of the master ADC
    bit_offset: 4
    bit_size: 1
  - name: JEOC_MST
    description: End of injected conversion flag of the master ADC
    bit_offset: 5
    bit_size: 1
  - name: JEOS_MST
    description: End of injected sequence flag of the master ADC
    bit_offset: 6
    bit_size: 1
  - name: AWD1_MST
    description: Analog watchdog 1 flag of the master ADC
    bit_offset: 7
    bit_size: 1
  - name: AWD2_MST
    description: Analog watchdog 2 flag of the master ADC
    bit_offset: 8
    bit_size: 1
  - name: AWD3_MST
    description: Analog watchdog 3 flag of the master ADC
    bit_offset: 9
    bit_size: 1
  - name: LDORDY_MST
    description: internal voltage regulator flag of the master ADC
    bit_offset: 12
    bit_size: 1
  - name: ADRDY_SLV
    description: Slave ADC ready
    bit_offset: 16
    bit_size: 1
  - name: EOSMP_SLV
    description: End of sampling phase flag of the slave ADC
    bit_offset: 17
    bit_size: 1
  - name: EOC_SLV
    description: End of regular conversion of the slave ADC
    bit_offset: 18
    bit_size: 1
  - name: EOS_SLV
    description: End of regular sequence flag of the slave ADC
    bit_offset: 19
    bit_size: 1
  - name: OVR_SLV
    description: Overrun flag of the slave ADC
    bit_offset: 20
    bit_size: 1
  - name: JEOC_SLV
    description: End of injected conversion flag of the slave ADC
    bit_offset: 21
    bit_size: 1
  - name: JEOS_SLV
    description: End of injected sequence flag of the slave ADC
    bit_offset: 22
    bit_size: 1
  - name: AWD1_SLV
    description: Analog watchdog 1 flag of the slave ADC
    bit_offset: 23
    bit_size: 1
  - name: AWD2_SLV
    description: Analog watchdog 2 flag of the slave ADC
    bit_offset: 24
    bit_size: 1
  - name: AWD3_SLV
    description: Analog watchdog 3 flag of the slave ADC
    bit_offset: 25
    bit_size: 1
  - name: LDORDY_SLV
    description: internal voltage regulator flag of the slave ADC
    bit_offset: 28
    bit_size: 1
enum/DAMDF:
  bit_size: 2
  variants:
  - name: NoPack
    description: Dual ADC mode without data packing (CDR and CDR2 registers not used).
    value: 0
  - name: Format32to10
    description: Data formatting mode for any data width (CDR data register is used when the data width is less than 16 bits, otherwise CDR2 register is used).
    value: 2
  - name: Format8
    description: Data formatting mode for data width lower that 8 bits (CDR data register is used).
    value: 3
enum/DUAL:
  bit_size: 5
  variants:
  - name: Independent
    description: Independent mode.
    value: 0
  - name: DualRJ
    description: Combined regular simultaneous + Injected simultaneous mode
    value: 1
  - name: DualRA
    description: Combined regular simultaneous + Alternate trigger mode
    value: 2
  - name: DualIJ
    description: Combined interleaved mode + Injected simultaneous mode
    value: 3
  - name: DualJ
    description: Injected simultaneous mode only
    value: 5
  - name: DualR
    description: Regular simultaneous mode only
    value: 6
  - name: DualI
    description: Interleaved mode only
    value: 7
  - name: DualA
    description: Alternate trigger mode only
    value: 9

