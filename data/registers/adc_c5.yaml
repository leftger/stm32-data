block/ADC:
  description: ADC register block
  items:
  - name: ISR
    description: interrupt and status register
    byte_offset: 0
    fieldset: ISR
  - name: IER
    description: interrupt enable register
    byte_offset: 4
    fieldset: IER
  - name: CR
    description: control register
    byte_offset: 8
    fieldset: CR
  - name: CFGR
    description: configuration register
    byte_offset: 12
    fieldset: CFGR
  - name: CFGR2
    description: configuration register 2
    byte_offset: 16
    fieldset: CFGR2
  - name: SMPR
    description: sample time register 1-2
    array:
      len: 2
      stride: 4
    byte_offset: 20
    fieldset: SMPR
  - name: PCSEL
    description: channel preselection register
    byte_offset: 28
    fieldset: PCSEL
  - name: SQR1
    description: regular sequence register 1
    byte_offset: 48
    fieldset: SQR1
  - name: SQR2
    description: regular sequence register 2
    byte_offset: 52
    fieldset: SQR2
  - name: SQR3
    description: regular sequence register 3
    byte_offset: 56
    fieldset: SQR3
  - name: SQR4
    description: regular sequence register 4
    byte_offset: 60
    fieldset: SQR4
  - name: DR
    description: regular data register
    byte_offset: 64
    access: Read
    fieldset: DR
  - name: JSQR
    description: injected sequence register
    byte_offset: 76
    fieldset: JSQR
  - name: OFCFGR
    description: offset configuration register
    array:
      len: 4
      stride: 4
    byte_offset: 80
    fieldset: OFCFGR
  - name: OFR
    description: offset register
    array:
      len: 4
      stride: 4
    byte_offset: 96
    fieldset: OFR
  - name: GCOMP
    description: gain compensation register
    byte_offset: 112
    fieldset: GCOMP
  - name: JDR
    description: injected channel data register
    array:
      len: 4
      stride: 4
    byte_offset: 128
    access: Read
    fieldset: JDR
  - name: AWD2CR
    description: analog watchdog 2 configuration register
    byte_offset: 160
    fieldset: AWD2CR
  - name: AWD3CR
    description: analog watchdog 3 configuration register
    byte_offset: 164
    fieldset: AWD3CR
  - name: AWDLTR
    description: analog watchdog lower threshold register
    byte_offset: 168
    array:
      len: 3
      stride: 8
    fieldset: AWDLTR
  - name: AWDHTR
    description: analog watchdog higher threshold register
    byte_offset: 172
    array:
      len: 3
      stride: 8
    fieldset: AWDHTR
  - name: CALFACT
    description: calibration factors
    byte_offset: 196
    fieldset: CALFACT
fieldset/AWDHTR:
  description: analog watchdog 1-3 higher threshold register
  fields:
  - name: HTR
    description: Analog watchdog 1-3 higher threshold.
    bit_offset: 0
    bit_size: 23
  - name: AWDFILT
    description: Analog watchdog filtering parameter
    bit_offset: 29
    bit_size: 3
fieldset/AWDLTR:
  description: analog watchdog 1 lower threshold register
  fields:
  - name: LTR
    description: Analog watchdog 1 lower threshold
    bit_offset: 0
    bit_size: 23
fieldset/AWD2CR:
  description: analog watchdog 2 configuration register
  fields:
  - name: AWDCH
    description: Analog watchdog 2 channel selection
    bit_offset: 0
    bit_size: 14
fieldset/AWD3CR:
  description: analog watchdog 3 configuration register
  fields:
  - name: AWDCH
    description: Analog watchdog 3 channel selection
    bit_offset: 0
    bit_size: 14
fieldset/CALFACT:
  description: calibration factors
  fields:
  - name: CALFACT
    description: Calibration factors
    bit_offset: 0
    bit_size: 7
fieldset/CFGR:
  description: configuration register
  fields:
  - name: DMNGT
    description: Data management configuration
    bit_offset: 0
    bit_size: 2
    enum: DMNGT
  - name: RES
    description: Data resolution
    bit_offset: 2
    bit_size: 2
    enum: RES
  - name: EXTSEL
    description: External trigger selection for regular group
    bit_offset: 5
    bit_size: 5
  - name: EXTEN
    description: External trigger enable and polarity selection for regular channels
    bit_offset: 10
    bit_size: 2
    enum: EXTEN
  - name: OVRMOD
    description: Overrun mode
    bit_offset: 12
    bit_size: 1
    enum: OVRMOD
  - name: CONT
    description: Single / continuous conversion mode for regular conversions.
    bit_offset: 13
    bit_size: 1
  - name: AUTDLY
    description: Delayed conversion mode
    bit_offset: 14
    bit_size: 1
  - name: DISCEN
    description: Discontinuous mode for regular channels
    bit_offset: 16
    bit_size: 1
  - name: DISCNUM
    description: Discontinuous mode channel count
    bit_offset: 17
    bit_size: 3
  - name: JDISCEN
    description: Discontinuous mode on injected channels
    bit_offset: 20
    bit_size: 1
  - name: AWD1SGL
    description: Enable the watchdog 1 on a single channel or on all channels
    bit_offset: 22
    bit_size: 1
    enum: AWD1SGL
  - name: AWD1EN
    description: Analog watchdog 1 enable on regular channels
    bit_offset: 23
    bit_size: 1
  - name: JAWD1EN
    description: Analog watchdog 1 enable on injected channels
    bit_offset: 24
    bit_size: 1
  - name: JAUTO
    description: Automatic injected group conversion
    bit_offset: 25
    bit_size: 1
  - name: AWD1CH
    description: Analog watchdog 1 channel selection
    bit_offset: 26
    bit_size: 5
fieldset/CFGR2:
  description: configuration register 2
  fields:
  - name: ROVSE
    description: Regular oversampling enable
    bit_offset: 0
    bit_size: 1
  - name: JOVSE
    description: Injected oversampling enable
    bit_offset: 1
    bit_size: 1
  - name: OVSS
    description: Oversampling shift
    bit_offset: 5
    bit_size: 4
  - name: TROVS
    description: Triggered regular oversampling
    bit_offset: 9
    bit_size: 1
    enum: TROVS
  - name: ROVSM
    description: Regular oversampling mode
    bit_offset: 10
    bit_size: 1
    enum: ROVSM
  - name: BULB
    description: 'Bulb sampling mode This bit is set and cleared by software to enable the bulb sampling mode. BULB bit must not be set when the SWTRIG bit is set. The very first ADC conversion is performed with the sampling time specified in SMPx bits. Note: The software is allowed to write this bit only when ADEN = 0. When the discontinuous mode is used, only DISCNUM[2:0] = 000 configuration is compatible with bulb mode.'
    bit_offset: 13
    bit_size: 1
  - name: SWTRIG
    description: Software trigger bit for sampling time control trigger mode
    bit_offset: 14
    bit_size: 1
    enum: SWTRIG
  - name: SMPTRIG
    description: Sampling time control trigger mode
    bit_offset: 15
    bit_size: 1
  - name: OVSR
    description: Oversampling ratio
    bit_offset: 16
    bit_size: 10
  - name: LSHIFT
    description: Left shift factor
    bit_offset: 28
    bit_size: 4
fieldset/CR:
  description: control register
  fields:
  - name: ADEN
    description: enable control
    bit_offset: 0
    bit_size: 1
  - name: ADDIS
    description: disable command
    bit_offset: 1
    bit_size: 1
  - name: ADSTART
    description: start of regular conversion
    bit_offset: 2
    bit_size: 1
  - name: JADSTART
    description: start of injected conversion
    bit_offset: 3
    bit_size: 1
  - name: ADSTP
    description: stop of regular conversion command
    bit_offset: 4
    bit_size: 1
    enum: ADSTP
  - name: JADSTP
    description: stop of injected conversion command
    bit_offset: 5
    bit_size: 1
  - name: ADVREGEN
    description: internal voltage regulator enable
    bit_offset: 28
    bit_size: 1
  - name: DEEPPWD
    description: Deep-power-down enable
    bit_offset: 29
    bit_size: 1
  - name: ADCAL
    description: calibration
    bit_offset: 31
    bit_size: 1
fieldset/DR:
  description: regular data register
  fields:
  - name: RDATA
    description: Regular data converted
    bit_offset: 0
    bit_size: 32
fieldset/GCOMP:
  description: gain compensation register
  fields:
  - name: GCOMPCOEFF
    description: Gain compensation coefficient The coefficient is divided by 4096 to get the gain factor ranging from 0 to 39999756
    bit_offset: 0
    bit_size: 14
  - name: GCOMP
    description: Gain compensation mode
    bit_offset: 31
    bit_size: 1
fieldset/IER:
  description: interrupt enable register
  fields:
  - name: ADRDYIE
    description: ready interrupt enable
    bit_offset: 0
    bit_size: 1
  - name: EOSMPIE
    description: End of sampling flag interrupt enable for regular conversions
    bit_offset: 1
    bit_size: 1
  - name: EOCIE
    description: End of regular conversion interrupt enable
    bit_offset: 2
    bit_size: 1
  - name: EOSIE
    description: End of regular sequence of conversions interrupt enable
    bit_offset: 3
    bit_size: 1
  - name: OVRIE
    description: Overrun interrupt enable
    bit_offset: 4
    bit_size: 1
  - name: JEOCIE
    description: End of injected conversion interrupt enable
    bit_offset: 5
    bit_size: 1
  - name: JEOSIE
    description: End of injected sequence of conversions interrupt enable
    bit_offset: 6
    bit_size: 1
  - name: AWDIE
    description: Analog watchdog 1-3 interrupt enable
    bit_offset: 7
    bit_size: 1
    array:
      len: 3
      stride: 1
  - name: LDORDYIE
    description: internal voltage regulator interrupt enable
    bit_offset: 12
    bit_size: 1
fieldset/ISR:
  description: interrupt and status register
  fields:
  - name: ADRDY
    description: ready
    bit_offset: 0
    bit_size: 1
  - name: EOSMP
    description: End of sampling flag
    bit_offset: 1
    bit_size: 1
  - name: EOC
    description: End of conversion flag
    bit_offset: 2
    bit_size: 1
  - name: EOS
    description: End of regular sequence flag
    bit_offset: 3
    bit_size: 1
  - name: OVR
    description: overrun
    bit_offset: 4
    bit_size: 1
  - name: JEOC
    description: Injected channel end of conversion flag
    bit_offset: 5
    bit_size: 1
  - name: JEOS
    description: Injected channel end of sequence flag
    bit_offset: 6
    bit_size: 1
  - name: AWD
    description: Analog watchdog 1-3 flags
    bit_offset: 7
    bit_size: 1
    array:
      len: 3
      stride: 1
  - name: LDORDY
    description: internal voltage regulator output ready flag
    bit_offset: 12
    bit_size: 1
fieldset/JDR:
  description: injected channel 1 data register
  fields:
  - name: JDATA
    description: Injected data
    bit_offset: 0
    bit_size: 32
fieldset/JSQR:
  description: injected sequence register
  fields:
  - name: JL
    description: Injected channel sequence length
    bit_offset: 0
    bit_size: 2
  - name: JEXTSEL
    description: External trigger selection for injected group
    bit_offset: 2
    bit_size: 5
  - name: JEXTEN
    description: External trigger enable and polarity selection for injected channels
    bit_offset: 7
    bit_size: 2
    enum: EXTEN
  - name: JSQ
    description: 1st-4th conversion in the injected sequence
    bit_offset: 9
    bit_size: 5
    array:
      len: 4
      stride: 6
fieldset/OFCFGR:
  description: offset 1 configuration register
  fields:
  - name: POSOFF
    description: Positive offset enable
    bit_offset: 24
    bit_size: 1
  - name: USAT
    description: Unsigned saturation enable
    bit_offset: 25
    bit_size: 1
  - name: SSAT
    description: Signed saturation enable
    bit_offset: 26
    bit_size: 1
  - name: OFFSET_CH
    description: Channel selection for the data offset y
    bit_offset: 27
    bit_size: 5
fieldset/OFR:
  description: offset 1 register
  fields:
  - name: OFFSET
    description: Data offset y for the channel programmed in OFFSETy_CH[4:0] bits.
    bit_offset: 0
    bit_size: 22
fieldset/PCSEL:
  description: channel preselection register
  fields:
  - name: PCSEL
    description: Channel x (VIN[i]) preselected
    bit_offset: 0
    bit_size: 1
    array:
      len: 14
      stride: 1
    enum: PCSEL
fieldset/SMPR1:
  description: sample time register 1
  fields:
  - name: SMP
    description: Channel x sampling time selection (x=9 to 0).
    bit_offset: 0
    bit_size: 3
    array:
      len: 10
      stride: 3
    enum: SAMPLE_TIME
fieldset/SMPR2:
  description: sample time register 2
  fields:
  - name: SMP
    description: Channel 10-13 sampling time selection
    bit_offset: 0
    bit_size: 3
    array:
      len: 10
      stride: 3
    enum: SAMPLE_TIME
fieldset/SQR1:
  description: regular sequence register 1
  fields:
  - name: L
    description: Regular channel sequence length
    bit_offset: 0
    bit_size: 4
  - name: SQ
    description: 1st-4th conversions in regular sequence
    bit_offset: 6
    bit_size: 5
    array:
      len: 4
      stride: 6
fieldset/SQR2:
  description: regular sequence register 2
  fields:
  - name: SQ
    description: 5th-9th conversions in regular sequence
    bit_offset: 0
    bit_size: 5
    array:
      len: 5
      stride: 6
fieldset/SQR3:
  description: regular sequence register 3
  fields:
  - name: SQ
    description: 10th-14th conversions in regular sequence
    bit_offset: 0
    bit_size: 5
    array:
      len: 5
      stride: 6
fieldset/SQR4:
  description: regular sequence register 4
  fields:
  - name: SQ
    description: 15th-16th conversion in regular sequence
    bit_offset: 0
    bit_size: 5
    array:
      len: 2
      stride: 6
enum/ADSTP:
  bit_size: 1
  variants:
  - name: Stop
    description: Stop conversion of channel
    value: 1
enum/AWD1SGL:
  bit_size: 1
  variants:
  - name: All
    description: Analog watchdog 1 enabled on all channels
    value: 0
  - name: Single
    description: Analog watchdog 1 enabled on a single channel
    value: 1
enum/AWDFILT:
  bit_size: 3
  variants:
  - name: B_0x0
    description: No filtering, one detection generates an AWD1 flag or an interrupt.
    value: 0
  - name: B_0x1
    description: two consecutive detections generate an AWD1 flag or an interrupt
    value: 1
  - name: B_0x7
    description: Eight consecutive detections generate an AWD1 flag or an interrupt
    value: 7
enum/DMNGT:
  bit_size: 2
  variants:
  - name: DR
    description: Regular conversion data stored in DR only
    value: 0
  - name: DMA_OneShot
    description: DMA one-shot mode selected
    value: 1
  - name: DMA_Circular
    description: DMA circular mode selected
    value: 3
enum/OVRMOD:
  bit_size: 1
  variants:
  - name: Preserve
    description: DR register is preserved with the old data when an overrun is detected
    value: 0
  - name: Overwrite
    description: DR register is overwritten with the last conversion result when an overrun is detected
    value: 1
enum/PCSEL:
  bit_size: 1
  variants:
  - name: NotPreselected
    description: Input channel x is not pre-selected
    value: 0
  - name: Preselected
    description: Pre-select input channel x
    value: 1
enum/RES:
  bit_size: 2
  variants:
  - name: Bits12
    description: 12-bit
    value: 0
  - name: Bits10
    description: 10-bit
    value: 1
  - name: Bits8
    description: 8-bit
    value: 2
  - name: Bits6
    description: 6-bit
    value: 3
enum/ROVSM:
  bit_size: 1
  variants:
  - name: Continued
    description: 'Continued mode: When injected conversions are triggered, the oversampling is temporary stopped and continued after the injection sequence (oversampling buffer is maintained during injected sequence).'
    value: 0
  - name: Resumed
    description: 'Resumed mode: When injected conversions are triggered, the current oversampling is aborted and resumed from start after the injection sequence (oversampling buffer is zeroed by injected sequence start).'
    value: 1
enum/SAMPLE_TIME:
  bit_size: 3
  variants:
  - name: Cycles3
    description: 3 ADC clock cycles
    value: 0
  - name: Cycles5
    description: 5 ADC clock cycles
    value: 1
  - name: Cycles8
    description: 8 ADC clock cycles
    value: 2
  - name: Cycles13
    description: 13 ADC clock cycles
    value: 3
  - name: Cycles25
    description: 25 ADC clock cycles
    value: 4
  - name: Cycles48
    description: 48 ADC clock cycles
    value: 5
  - name: Cycles139
    description: 139 ADC clock cycles
    value: 6
  - name: Cycles289
    description: 289 ADC clock cycles
    value: 7
enum/SWTRIG:
  bit_size: 1
  variants:
  - name: Conversion
    description: Software trigger starts the conversion for sampling time control trigger mode
    value: 0
  - name: Sampling
    description: Software trigger starts the sampling for sampling time control trigger mode
    value: 1
enum/TROVS:
  bit_size: 1
  variants:
  - name: Automatic
    description: All oversampled conversions for a channel are done consecutively following a trigger
    value: 0
  - name: Triggered
    description: Each oversampled conversion for a channel needs a new trigger
    value: 1
enum/EXTEN:
  bit_size: 2
  variants:
  - name: Disabled
    description: Trigger detection disabled
    value: 0
  - name: RisingEdge
    description: Trigger detection on the rising edge
    value: 1
  - name: FallingEdge
    description: Trigger detection on the falling edge
    value: 2
  - name: BothEdges
    description: Trigger detection on both the rising and falling edges
    value: 3
