    byte_offset: 4
    fieldset: IER
  - name: CR
    description: control register
    byte_offset: 8
    fieldset: CR
  - name: CFGR
    description: configuration register
    byte_offset: 12
    fieldset: CFGR
  - name: CFGR2
    description: configuration register 2
    byte_offset: 16
    fieldset: CFGR2
  - name: SMPR1
    description: sample time register 1
    byte_offset: 20
    fieldset: SMPR1
  - name: SMPR2
    description: sample time register 2
    byte_offset: 24
    fieldset: SMPR2
  - name: PCSEL
    description: channel preselection register
    byte_offset: 28
    fieldset: PCSEL
  - name: SQR1
    description: regular sequence register 1
    byte_offset: 48
    fieldset: SQR1
  - name: SQR2
    description: regular sequence register 2
    byte_offset: 52
    fieldset: SQR2
  - name: SQR3
    description: regular sequence register 3
    byte_offset: 56
    fieldset: SQR3
  - name: SQR4
    description: regular sequence register 4
    byte_offset: 60
    fieldset: SQR4
  - name: DR
    description: regular data register
    byte_offset: 64
    access: Read
    fieldset: DR
  - name: JSQR
    description: injected sequence register
    byte_offset: 76
    fieldset: JSQR
  - name: OFCFGR
    description: offset 1-4 configuration register
    array:
      len: 4
      stride: 4
    byte_offset: 80
    fieldset: OFCFGR
  - name: OFR
    description: offset 1-4 register
    array:
      len: 4
      stride: 4
    byte_offset: 96
    fieldset: OFR
  - name: GCOMP
    description: gain compensation register
    byte_offset: 112
    fieldset: GCOMP
  - name: JDR
    description: injected channel 1-4 data register
    array:
      len: 4
      stride: 4
    byte_offset: 128
