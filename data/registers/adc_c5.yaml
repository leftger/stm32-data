    fieldset: JDR
  - name: AWD2CR
    description: analog watchdog 2 configuration register
    byte_offset: 160
    fieldset: AWD2CR
  - name: AWD3CR
    description: analog watchdog 3 configuration register
    byte_offset: 164
    fieldset: AWD3CR
  - name: AWD1LTR
    description: analog watchdog 1 lower threshold register
    byte_offset: 168
    fieldset: AWD1LTR
  - name: AWD1HTR
    description: analog watchdog 1 higher threshold register
    byte_offset: 172
    fieldset: AWD1HTR
  - name: AWD2LTR
    description: analog watchdog 2 lower threshold register
    byte_offset: 176
    fieldset: AWD2LTR
  - name: AWD2HTR
    description: analog watchdog 2 higher threshold register
    byte_offset: 180
    fieldset: AWD2HTR
  - name: AWD3LTR
    description: analog watchdog 3 lower threshold register
    byte_offset: 184
    fieldset: AWD3LTR
  - name: AWD3HTR
    description: analog watchdog 3 higher threshold register
    byte_offset: 188
    fieldset: AWD3HTR
  - name: CALFACT
    description: Calibration Factors
    byte_offset: 196
    fieldset: CALFACT
fieldset/AWD1HTR:
  description: analog watchdog 1 higher threshold register
  fields:
  - name: HTR
    description: Analog watchdog 1 higher threshold.
    bit_offset: 0
    bit_size: 23
  - name: AWDFILT
    description: Analog watchdog filtering parameter.
    bit_offset: 29
    bit_size: 3
    enum: AWDFILT
fieldset/AWD1LTR:
  description: analog watchdog 1 lower threshold register
  fields:
  - name: LTR
    description: Analog watchdog 1 lower threshold.
    bit_offset: 0
    bit_size: 23
fieldset/AWD2CR:
  description: analog watchdog 2 configuration register
  fields:
  - name: AWDCH
    description: Analog watchdog 2 channel selection.
    bit_offset: 0
    bit_size: 14
fieldset/AWD2HTR:
  description: analog watchdog 2 higher threshold register
  fields:
  - name: HTR
    description: Analog watchdog 2 higher threshold.
    bit_offset: 0
    bit_size: 23
fieldset/AWD2LTR:
  description: analog watchdog 2 lower threshold register
  fields:
  - name: LTR
    description: Analog watchdog 2 lower threshold.
    bit_offset: 0
    bit_size: 23
fieldset/AWD3CR:
  description: analog watchdog 3 configuration register
  fields:
  - name: AWDCH
    description: Analog watchdog 3 channel selection.
    bit_offset: 0
    bit_size: 14
fieldset/AWD3HTR:
  description: analog watchdog 3 higher threshold register
  fields:
  - name: HTR
    description: Analog watchdog 3 higher threshold.
    bit_offset: 0
    bit_size: 23
fieldset/AWD3LTR:
  description: analog watchdog 3 lower threshold register
  fields:
  - name: LTR
    description: Analog watchdog 3 lower threshold.
    bit_offset: 0
    bit_size: 23
fieldset/CALFACT:
  description: calibration factors
  fields:
  - name: CALFACT
    description: Calibration factors.
    bit_offset: 0
    bit_size: 7
fieldset/CFGR:
  description: configuration register
  fields:
  - name: DMNGT
    description: Data management configuration.
    bit_offset: 0
    bit_size: 2
    enum: DMNGT
  - name: RES
    description: Data resolution.
    bit_offset: 2
    bit_size: 2
    enum: RES
  - name: EXTSEL
    description: External trigger selection for regular group.
    bit_offset: 5
    bit_size: 5
  - name: EXTEN
    description: External trigger enable and polarity selection for regular channels.
    bit_offset: 10
    bit_size: 2
    enum: EXTEN
  - name: OVRMOD
    description: Overrun mode.
    bit_offset: 12
    bit_size: 1
    enum: OVRMOD
  - name: CONT
    description: Single / continuous conversion mode for regular conversions.
    bit_offset: 13
    bit_size: 1
  - name: AUTDLY
    description: Delayed conversion mode.
    bit_offset: 14
    bit_size: 1
  - name: DISCEN
    description: Discontinuous mode for regular channels.
    bit_offset: 16
    bit_size: 1
  - name: DISCNUM
    description: Discontinuous mode channel count.
    bit_offset: 17
    bit_size: 3
  - name: JDISCEN
    description: Discontinuous mode on injected channels.
    bit_offset: 20
    bit_size: 1
  - name: AWD1SGL
    description: Enable the watchdog 1 on a single channel or on all channels.
    bit_offset: 22
    bit_size: 1
    enum: AWD1SGL
  - name: AWD1EN
    description: Analog watchdog 1 enable on regular channels.
    bit_offset: 23
    bit_size: 1
  - name: JAWD1EN
    description: Analog watchdog 1 enable on injected channels.
    bit_offset: 24
    bit_size: 1
  - name: JAUTO
    description: Automatic injected group conversion.
    bit_offset: 25
    bit_size: 1
  - name: AWD1CH
    description: Analog watchdog 1 channel selection.
    bit_offset: 26
    bit_size: 5
fieldset/CFGR2:
  description: configuration register 2
  fields:
  - name: ROVSE
    description: Regular oversampling enable.
    bit_offset: 0
    bit_size: 1
  - name: JOVSE
    description: Injected oversampling enable.
    bit_offset: 1
    bit_size: 1
  - name: OVSS
    description: Oversampling shift.
    bit_offset: 5
    bit_size: 4
  - name: TROVS
    description: Triggered regular oversampling.
    bit_offset: 9
    bit_size: 1
    enum: TROVS
  - name: ROVSM
    description: Regular oversampling mode.
    bit_offset: 10
    bit_size: 1
    enum: ROVSM
  - name: BULB
    description: 'Bulb sampling mode This bit is set and cleared by software to enable the bulb sampling mode. BULB bit must not be set when the SWTRIG bit is set. The very first ADC conversion is performed with the sampling time specified in SMPx bits. Note: The software is allowed to write this bit only when ADEN = 0. When the discontinuous mode is used, only DISCNUM[2:0] = 000 configuration is compatible with bulb mode.'
    bit_offset: 13
    bit_size: 1
  - name: SWTRIG
    description: Software trigger bit for sampling time control trigger mode.
    bit_offset: 14
    bit_size: 1
    enum: SWTRIG
  - name: SMPTRIG
    description: Sampling time control trigger mode.
    bit_offset: 15
    bit_size: 1
  - name: OVSR
    description: Oversampling ratio.
    bit_offset: 16
    bit_size: 10
  - name: LSHIFT
    description: Left shift factor.
    bit_offset: 28
    bit_size: 4
fieldset/CR:
  description: control register
  fields:
  - name: ADEN
    description: 'ADC enable control This bit is set by software to enable the ADC. The ADC is effectively ready to operate once the flag ADRDY has been set. It is cleared by hardware when the ADC is disabled, after the execution of the ADDIS command. Note: The software is allowed to set ADEN only when all bits of ADC_CR registers are 0 (ADCAL = 0, JADSTART = 0, ADSTART = 0, ADSTP = 0, ADDIS = 0 and ADEN = 0) except for bit ADVREGEN which must be 1 (and the software must have wait for the startup time of the voltage regulator).'
    bit_offset: 0
    bit_size: 1
  - name: ADDIS
    description: 'ADC disable command This bit is set by software to disable the ADC (ADDIS command) and put it into power-down state (OFF state). It is cleared by hardware once the ADC is effectively disabled (ADEN is also cleared by hardware at this time). Note: The software is allowed to set ADDIS only when ADEN = 1 and both ADSTART = 0 and JADSTART = 0 (which ensures that no conversion is ongoing).'
    bit_offset: 1
    bit_size: 1
  - name: ADSTART
    description: 'ADC start of regular conversion This bit is set by software to start ADC conversion of regular channels. Depending on the configuration bits EXTEN, a conversion immediately starts (software trigger configuration) or once a regular hardware trigger event occurs (hardware trigger configuration). In Single conversion mode when software trigger is selected (EXTSEL = 0x0 and DISEN = 1), this bit is cleared by hardware immediately after regular conversion starts. In all cases, after the execution of the ADSTP command, this bit and ADSTP are cleared by hardware simultaneously. Note: The software is allowed to set ADSTART only when ADEN = 1 and ADDIS = 0 (ADC is enabled and there is no pending request to disable the ADC) In auto-injection mode (JAUTO = 1), regular and auto-injected conversions are started by setting bit ADSTART (JADSTART must be kept cleared).'
    bit_offset: 2
    bit_size: 1
  - name: JADSTART
    description: 'ADC start of injected conversion This bit is set by software to start ADC conversion of injected channels. Depending on the configuration bits JEXTEN, a conversion immediately starts (software trigger configuration) or once an injected hardware trigger event occurs (hardware trigger configuration). In Single conversion mode when software trigger is selected (JEXTSEL = 0x0 and JDISEN = 1), this bit is cleared by hardware immediately after injected conversion starts. In all cases, after the execution of the JADSTP command, this bit and JADSTP are cleared by hardware simultaneously. Note: The software is allowed to set JADSTART only when ADEN = 1, ADDIS = 0 and JAUTO = 0 (ADC is enabled and there is no pending request to disable the ADC). In auto-injection mode (JAUTO = 1), regular and auto-injected conversions are started by setting bit ADSTART (JADSTART must be kept cleared).'
    bit_offset: 3
    bit_size: 1
  - name: ADSTP
    description: ADC stop of regular conversion command.
    bit_offset: 4
    bit_size: 1
  - name: JADSTP
    description: ADC stop of injected conversion command.
    bit_offset: 5
    bit_size: 1
  - name: ADVREGEN
    description: ADC internal voltage regulator enable.
    bit_offset: 28
    bit_size: 1
  - name: DEEPPWD
    description: Deep-power-down enable.
    bit_offset: 29
    bit_size: 1
  - name: ADCAL
    description: ADC calibration.
    bit_offset: 31
    bit_size: 1
fieldset/DR:
  description: ADC regular data register.
  fields:
  - name: RDATA
    description: Regular data converted.
    bit_offset: 0
    bit_size: 32
fieldset/GCOMP:
  description: ADC gain compensation register.
  fields:
  - name: GCOMPCOEFF
    description: Gain compensation coefficient. The coefficient is divided by 4096 to get the gain factor ranging from 0 to 3.9999756
    bit_offset: 0
    bit_size: 14
  - name: GCOMP
    description: Gain compensation mode.
    bit_offset: 31
    bit_size: 1
fieldset/IER:
  description: ADC interrupt enable register.
  fields:
  - name: ADRDYIE
    description: ADC ready interrupt enable.
    bit_offset: 0
    bit_size: 1
  - name: EOSMPIE
    description: End of sampling flag interrupt enable for regular conversions.
    bit_offset: 1
    bit_size: 1
  - name: EOCIE
    description: End of regular conversion interrupt enable.
    bit_offset: 2
    bit_size: 1
  - name: EOSIE
    description: End of regular sequence of conversions interrupt enable.
    bit_offset: 3
    bit_size: 1
  - name: OVRIE
    description: Overrun interrupt enable.
    bit_offset: 4
    bit_size: 1
  - name: JEOCIE
    description: End of injected conversion interrupt enable.
    bit_offset: 5
    bit_size: 1
  - name: JEOSIE
    description: End of injected sequence of conversions interrupt enable.
    bit_offset: 6
    bit_size: 1
  - name: AWDIE
    description: Analog watchdog 1-3 interrupt enable.
    bit_offset: 7
    bit_size: 1
    array:
      len: 3
      stride: 1
  - name: LDORDYIE
    description: internal voltage regulator interrupt enable.
    bit_offset: 12
    bit_size: 1
fieldset/ISR:
  description: interrupt and status register.
  fields:
  - name: ADRDY
    description: ADC ready.
    bit_offset: 0
    bit_size: 1
  - name: EOSMP
    description: End of sampling flag.
    bit_offset: 1
    bit_size: 1
  - name: EOC
    description: End of conversion flag.
    bit_offset: 2
    bit_size: 1
  - name: EOS
    description: End of regular sequence flag.
    bit_offset: 3
    bit_size: 1
  - name: OVR
    description: ADC overrun.
    bit_offset: 4
    bit_size: 1
  - name: JEOC
    description: Injected channel end of conversion flag.
    bit_offset: 5
    bit_size: 1
  - name: JEOS
    description: Injected channel end of sequence flag.
    bit_offset: 6
    bit_size: 1
  - name: AWD1
    description: Analog watchdog 1 flag.
    bit_offset: 7
    bit_size: 1
  - name: AWD2
    description: Analog watchdog 2 flag.
    bit_offset: 8
    bit_size: 1
  - name: AWD3
    description: Analog watchdog 3 flag.
    bit_offset: 9
    bit_size: 1
  - name: LDORDY
    description: ADC internal voltage regulator output ready flag.
    bit_offset: 12
    bit_size: 1
fieldset/JDR:
  description: ADC injected channel 1 data register.
  fields:
  - name: JDATA
    description: Injected data.
    bit_offset: 0
    bit_size: 32
fieldset/JSQR:
  description: ADC injected sequence register.
  fields:
  - name: JL
    description: Injected channel sequence length.
    bit_offset: 0
    bit_size: 2
  - name: JEXTSEL
    description: External trigger selection for injected group.
    bit_offset: 2
    bit_size: 5
  - name: JEXTEN
    description: External trigger enable and polarity selection for injected channels.
    bit_offset: 7
    bit_size: 2
    enum: EXTEN
  - name: JSQ
    description: 1st-4th conversion in the injected sequence.
    bit_offset: 9
    bit_size: 5
    array:
      len: 4
      stride: 6
fieldset/OFCFGR:
  description: offset 1 configuration register.
  fields:
  - name: POSOFF
    description: Positive offset enable.
    bit_offset: 24
    bit_size: 1
  - name: USAT
    description: Unsigned saturation enable.
    bit_offset: 25
    bit_size: 1
  - name: SSAT
    description: Signed saturation enable.
    bit_offset: 26
    bit_size: 1
  - name: OFFSET_CH
    description: Channel selection for the data offset y.
    bit_offset: 27
    bit_size: 5
fieldset/OFR:
  description: offset 1 register.
  fields:
  - name: OFFSET
    description: Data offset y for the channel programmed in OFFSETy_CH[4:0] bits.
    bit_offset: 0
    bit_size: 22
fieldset/PCSEL:
  description: channel preselection register.
  fields:
  - name: PCSEL
    description: Channel x (VIN[i]) preselected
    bit_offset: 0
    bit_size: 1
    array:
      len: 14
      stride: 1
    enum: PCSEL
fieldset/SMPR1:
  description: ADC sample time register 1.
  fields:
  - name: SMP
    description: Channel x sampling time selection (x=9 to 0).
    bit_offset: 0
    bit_size: 3
    array:
      len: 10
      stride: 3
    enum: SAMPLE_TIME
fieldset/SMPR2:
  description: sample time register 2
  fields:
  - name: SMP
    description: Channel 10-13 sampling time selection
    bit_offset: 0
    bit_size: 3
    array:
      len: 10
      stride: 3
    enum: SAMPLE_TIME
fieldset/SQR1:
  description: regular sequence register 1
  fields:
  - name: L
    description: Regular channel sequence length
    bit_offset: 0
    bit_size: 4
  - name: SQ
    description: 1st -4th conversions in regular sequence
    bit_offset: 6
    bit_size: 5
    array:
      len: 4
      stride: 6
fieldset/SQR2:
  description: regular sequence register 2
  fields:
  - name: SQ
    description: 5th-9th conversions in regular sequence
    bit_offset: 0
    bit_size: 5
    array:
      len: 5
      stride: 6
fieldset/SQR3:
  description: regular sequence register 3
  fields:
  - name: SQ
    description: 10th-14th conversions in regular sequence
    bit_offset: 0
    bit_size: 5
    array:
      len: 5
      stride: 6
fieldset/SQR4:
  description: regular sequence register 4
  fields:
  - name: SQ
    description: 15th-16th conversion in regular sequence
    bit_offset: 0
    bit_size: 5
    array:
      len: 2
      stride: 6
enum/AWD1SGL:
  bit_size: 1
  variants:
  - name: B_0x0
    description: Analog watchdog 1 enabled on all channels.
    value: 0
  - name: B_0x1
    description: Analog watchdog 1 enabled on a single channel.
    value: 1
enum/AWDFILT:
  bit_size: 3
  variants:
  - name: B_0x0
    description: No filtering, one detection generates an AWD1 flag or an interrupt.
    value: 0
  - name: B_0x1
    description: two consecutive detections generate an AWD1 flag or an interrupt.
    value: 1
  - name: B_0x7
    description: Eight consecutive detections generate an AWD1 flag or an interrupt.
    value: 7
enum/DMNGT:
  bit_size: 2
  variants:
  - name: B_0x0
    description: Regular conversion data stored in DR only.
    value: 0
  - name: B_0x1
    description: DMA one-shot mode selected.
    value: 1
  - name: B_0x3
    description: DMA circular mode selected.
    value: 3
enum/EXTEN:
  bit_size: 2
  variants:
  - name: B_0x0
    description: Hardware trigger detection disabled (conversions can be launched by software).
    value: 0
  - name: B_0x1
    description: Hardware trigger detection on the rising edge.
    value: 1
  - name: B_0x2
    description: Hardware trigger detection on the falling edge.
    value: 2
  - name: B_0x3
    description: Hardware trigger detection on both the rising and falling edges.
    value: 3
enum/OVRMOD:
  bit_size: 1
  variants:
  - name: B_0x0
    description: DR register is preserved with the old data when an overrun is detected.
    value: 0
  - name: B_0x1
    description: DR register is overwritten with the last conversion result when an overrun is detected.
    value: 1
enum/PCSEL:
  bit_size: 1
  variants:
  - name: NotPreselected
    description: Input channel x is not pre-selected
    value: 0
  - name: Preselected
    description: Pre-select input channel x
    value: 1
enum/RES:
  bit_size: 2
  variants:
  - name: B_0x0
    description: 12-bit.
    value: 0
  - name: B_0x1
    description: 10-bit.
    value: 1
  - name: B_0x2
    description: 8-bit.
    value: 2
  - name: B_0x3
    description: 6-bit.
    value: 3
enum/ROVSM:
  bit_size: 1
  variants:
  - name: B_0x0
    description: 'Continued mode: When injected conversions are triggered, the oversampling is temporary stopped and continued after the injection sequence (oversampling buffer is maintained during injected sequence).'
    value: 0
  - name: B_0x1
    description: 'Resumed mode: When injected conversions are triggered, the current oversampling is aborted and resumed from start after the injection sequence (oversampling buffer is zeroed by injected sequence start).'
    value: 1
enum/SAMPLE_TIME:
  bit_size: 3
  variants:
  - name: B_0x0
    description: 3 ADC clock cycles.
    value: 0
  - name: B_0x1
    description: 5 ADC clock cycles.
    value: 1
  - name: B_0x2
    description: 8 ADC clock cycles.
    value: 2
  - name: B_0x3
    description: 13 ADC clock cycles.
    value: 3
  - name: B_0x4
    description: 25 ADC clock cycles.
    value: 4
  - name: B_0x5
    description: 48 ADC clock cycles.
    value: 5
  - name: B_0x6
    description: 139 ADC clock cycles.
    value: 6
  - name: B_0x7
    description: 289 ADC clock cycles.
    value: 7
enum/SWTRIG:
  bit_size: 1
  variants:
  - name: B_0x0
    description: Software trigger starts the conversion for sampling time control trigger mode.
    value: 0
  - name: B_0x1
    description: Software trigger starts the sampling for sampling time control trigger mode.
    value: 1
enum/TROVS:
  bit_size: 1
  variants:
  - name: B_0x0
    description: All oversampled conversions for a channel are done consecutively following a trigger.
    value: 0
  - name: B_0x1
    description: Each oversampled conversion for a channel needs a new trigger.
    value: 1
