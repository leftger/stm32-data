block/PKA:
  description: Public key accelerator.
  items:
  - name: CR
    description: PKA control register.
    byte_offset: 0
    fieldset: CR
  - name: SR
    description: PKA status register.
    byte_offset: 4
    fieldset: SR
  - name: CLRFR
    description: PKA clear flag register.
    byte_offset: 8
    fieldset: CLRFR
  - name: RAM
    description: PKA internal memeory.
    array:
      len: 1334
      stride: 4
    byte_offset: 1024
fieldset/CLRFR:
  description: PKA clear flag register.
  fields:
  - name: PROCENDFC
    description: Clear PKA End of Operation flag.
    bit_offset: 17
    bit_size: 1
  - name: RAMERRFC
    description: Clear PKA RAM error flag.
    bit_offset: 19
    bit_size: 1
  - name: ADDRERRFC
    description: Clear address error flag.
    bit_offset: 20
    bit_size: 1
  - name: OPERRFC
    description: Clear operation error flag.
    bit_offset: 21
    bit_size: 1
fieldset/CR:
  description: PKA control register.
  fields:
  - name: EN
    description: PKA enable.
    bit_offset: 0
    bit_size: 1
  - name: START
    description: start the operation.
    bit_offset: 1
    bit_size: 1
