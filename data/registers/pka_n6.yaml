block/PKA:
  description: Public key accelerator.
  items:
  - name: CR
    description: PKA control register.
    byte_offset: 0
    fieldset: CR
  - name: SR
    description: PKA status register.
    byte_offset: 4
    fieldset: SR
  - name: CLRFR
    description: PKA clear flag register.
    byte_offset: 8
    fieldset: CLRFR
  - name: RAM
    description: PKA internal memeory.
    array:
      len: 1334
      stride: 4
    byte_offset: 1024
fieldset/CLRFR:
  description: PKA clear flag register.
  fields:
  - name: PROCENDFC
    description: Clear PKA End of Operation flag.
    bit_offset: 17
    bit_size: 1
  - name: RAMERRFC
    description: Clear PKA RAM error flag.
    bit_offset: 19
    bit_size: 1
  - name: ADDRERRFC
    description: Clear address error flag.
    bit_offset: 20
    bit_size: 1
  - name: OPERRFC
    description: Clear operation error flag.
    bit_offset: 21
    bit_size: 1
fieldset/CR:
  description: PKA control register.
  fields:
  - name: EN
    description: PKA enable.
    bit_offset: 0
    bit_size: 1
  - name: START
    description: start the operation.
    bit_offset: 1
    bit_size: 1
  - name: MODE
    description: PKA operation code.
    bit_offset: 8
    bit_size: 6
    enum: MODE
  - name: PROCENDIE
    description: End of operation interrupt enable.
    bit_offset: 17
    bit_size: 1
  - name: RAMERRIE
    description: RAM error interrupt enable.
    bit_offset: 19
    bit_size: 1
  - name: ADDRERRIE
    description: Address error interrupt enable.
    bit_offset: 20
    bit_size: 1
  - name: OPERRIE
    description: Operation error interrupt enable.
    bit_offset: 21
    bit_size: 1
fieldset/SR:
  description: PKA status register.
  fields:
  - name: INITOK
    description: PKA initialization OK.
    bit_offset: 0
    bit_size: 1
  - name: LMF
    description: Limited mode flag.
    bit_offset: 1
    bit_size: 1
  - name: BUSY
    description: PKA operation is in progress.
    bit_offset: 16
    bit_size: 1
  - name: PROCENDF
    description: PKA End of Operation flag.
    bit_offset: 17
    bit_size: 1
  - name: RAMERRF
    description: PKA RAM error flag.
    bit_offset: 19
    bit_size: 1
  - name: ADDRERRF
    description: Address error flag.
    bit_offset: 20
    bit_size: 1
  - name: OPERRF
    description: Operation error flag.
    bit_offset: 21
    bit_size: 1
enum/MODE:
  bit_size: 6
  variants:
  - name: B_0x0
    description: Montgomery parameter computation then modular exponentiation.
    value: 0
  - name: B_0x1
    description: Montgomery parameter computation only.
    value: 1
  - name: B_0x2
    description: Modular exponentiation only (Montgomery parameter must be loaded first).
    value: 2
  - name: B_0x3
    description: Modular exponentiation (protected, used when manipulating secrets).
    value: 3
  - name: B_0x7
    description: RSA CRT exponentiation.
    value: 7
  - name: B_0x8
    description: Modular inversion.
    value: 8
  - name: B_0x9
    description: Arithmetic addition.
    value: 9
  - name: B_0xA
    description: Arithmetic subtraction.
    value: 10
  - name: B_0xB
    description: Arithmetic multiplication.
    value: 11
  - name: B_0xC
    description: Arithmetic comparison.
    value: 12
  - name: B_0xD
    description: Modular reduction.
    value: 13
  - name: B_0xE
    description: Modular addition.
    value: 14
  - name: B_0xF
    description: Modular subtraction.
    value: 15
  - name: B_0x10
    description: Montgomery multiplication.
    value: 16
  - name: B_0x20
    description: Montgomery parameter computation then ECC scalar multiplication.
    value: 32
  - name: B_0x23
    description: ECC complete addition.
    value: 35
  - name: B_0x24
    description: ECDSA sign.
    value: 36
  - name: B_0x26
    description: ECDSA verification.
    value: 38
  - name: B_0x27
    description: ECC double base ladder.
    value: 39
  - name: B_0x28
    description: Point on elliptic curve Fp check.
    value: 40
  - name: B_0x2F
    description: ECC projective to affine.
    value: 47
