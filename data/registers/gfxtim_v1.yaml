    description: absolute frame counter status This bit returns the status of the absolute frame counter.
    bit_offset: 0
    bit_size: 1
    enum: AFCS
  - name: ALCS
    description: absolute line counter status This bit returns the status of the absolute line counter.
    bit_offset: 4
    bit_size: 1
    enum: ALCS
  - name: RFC1S
    description: relative frame counter 1 status This bit returns the status of the relative frame counter 1.
    bit_offset: 16
    bit_size: 1
    enum: RFC1S
  - name: RFC2S
    description: relative frame counter 2 status This bit returns the status of the relative frame counter 2.
    bit_offset: 20
    bit_size: 1
    enum: RFC2S
