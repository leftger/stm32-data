    bit_offset: 0
    bit_size: 3
    enum: LES1
  - name: FES1
    description: 'frame-event selection 1 This field defines the frame-event selection for complex event 1 generation. others: reserved.'
    bit_offset: 4
    bit_size: 3
    enum: FES1
  - name: LES2
    description: 'line-event selection 2 This field defines the line-event selection for complex event 2 generation. others: reserved.'
    bit_offset: 8
    bit_size: 3
    enum: LES2
  - name: FES2
    description: 'frame-event selection 2 This field defines the frame-event selection for complex event 2 generation. others: reserved.'
    bit_offset: 12
    bit_size: 3
    enum: FES2
  - name: LES3
    description: 'line-event selection 3 This field defines the line-event selection for complex event 3 generation. others: reserved.'
    bit_offset: 16
    bit_size: 3
    enum: LES3
  - name: FES3
    description: 'frame-event selection 3 This field defines the frame-event selection for complex event 3 generation. others: reserved.'
    bit_offset: 20
    bit_size: 3
    enum: FES3
  - name: LES4
    description: 'line-event selection 4 This field defines the line-event selection for complex event 4 generation. others: Reserved.'
    bit_offset: 24
    bit_size: 3
    enum: LES4
  - name: FES4
    description: 'frame-event selection 4 This field defines the frame-event selection for complex event 4 generation. others: reserved.'
    bit_offset: 28
    bit_size: 3
    enum: FES4
fieldset/FCCRR:
  description: GFXTIM frame clock counter reload register.
  fields:
  - name: RELOAD
    description: reload value Reload value of the frame clock counter.
    bit_offset: 0
    bit_size: 12
fieldset/ICR:
  description: GFXTIM interrupt clear register.
  fields:
  - name: CAFCOF
    description: clear absolute frame counter overflow flag This bit clears AFCOF in GXTIM_ISR.
    bit_offset: 0
    bit_size: 1
    enum: CAFCOF
  - name: CALCOF
    description: clear absolute line counter overflow flag This bit clears ALCOF in GXTIM_ISR.
    bit_offset: 1
    bit_size: 1
    enum: CALCOF
  - name: CTEF
    description: clear tearing-effect flag This bit clears TEF in GXTIM_ISR.
    bit_offset: 2
    bit_size: 1
    enum: CTEF
  - name: CAFCC1F
    description: clear absolute frame counter compare 1 flag This bit clears AFCC1F in GXTIM_ISR.
    bit_offset: 4
    bit_size: 1
    enum: CAFCC1F
  - name: CALCC1F
    description: clear absolute line counter compare 1 flag This bit clears ALCC1F in GXTIM_ISR.
    bit_offset: 8
    bit_size: 1
    enum: CALCC1F
  - name: CALCC2F
    description: clear absolute line counter compare 2 flag This bit clears ALCC2F in GXTIM_ISR.
    bit_offset: 9
    bit_size: 1
    enum: CALCC2F
  - name: CRFC1RF
    description: clear relative frame counter 1 reload flag This bit clears RFC1RF in GXTIM_ISR.
    bit_offset: 12
    bit_size: 1
    enum: CRFC1RF
  - name: CRFC2RF
    description: clear relative frame counter 2 reload flag This bit clears RFC2RF in GXFXTIM_ISR.
    bit_offset: 13
    bit_size: 1
    enum: CRFC2RF
  - name: CEV1F
    description: clear event 1 flag This bit EV1F in GXFXTIM_ISR.
    bit_offset: 16
    bit_size: 1
    enum: CEV1F
  - name: CEV2F
    description: clear event 2 flag This bit clears EV2F in GXFXTIM_ISR.
    bit_offset: 17
    bit_size: 1
    enum: CEV2F
  - name: CEV3F
    description: clear event 3 flag This bit clears EV3F in GXFXTIM_ISR.
    bit_offset: 18
    bit_size: 1
    enum: CEV3F
  - name: CEV4F
    description: clear event 4 flag This bit clears EV4F in GXFXTIM_ISR.
    bit_offset: 19
    bit_size: 1
    enum: CEV4F
  - name: CWDGAF
    description: clear watchdog alarm flag This bit clears WDGAF in GXFXTIM_ISR.
    bit_offset: 24
    bit_size: 1
    enum: CWDGAF
  - name: CWDGPF
    description: clear watchdog pre-alarm flag This bit clears WDGPF in GXFXTIM_ISR.
    bit_offset: 25
    bit_size: 1
    enum: CWDGPF
fieldset/IER:
  description: GFXTIM interrupt enable register.
  fields:
  - name: AFCOIE
    description: absolute frame counter overflow interrupt enable This bit enables the absolute frame counter overflow interrupt generation.
    bit_offset: 0
    bit_size: 1
    enum: AFCOIE
  - name: ALCOIE
    description: absolute line counter overflow interrupt enable This bit enables the absolute line counter overflow interrupt generation.
    bit_offset: 1
    bit_size: 1
    enum: ALCOIE
  - name: TEIE
    description: tearing-effect interrupt enable This bit enables the Tearing Effect interrupt generation.
    bit_offset: 2
    bit_size: 1
    enum: TEIE
  - name: AFCC1IE
    description: absolute frame counter compare 1 interrupt enable This bit enables the absolute frame counter compare interrupt generation.
    bit_offset: 4
    bit_size: 1
    enum: AFCC1IE
  - name: ALCC1IE
    description: absolute line counter compare 1 interrupt enable This bit enables the absolute line counter compare 1 interrupt generation.
    bit_offset: 8
    bit_size: 1
    enum: ALCC1IE
  - name: ALCC2IE
    description: absolute line counter compare 2 interrupt enable This bit enables the absolute line counter compare 2 interrupt generation.
    bit_offset: 9
    bit_size: 1
    enum: ALCC2IE
  - name: RFC1RIE
    description: relative frame counter 1 reload interrupt enable This bit enables the relative frame counter 1 reload interrupt generation.
    bit_offset: 12
    bit_size: 1
    enum: RFC1RIE
  - name: RFC2RIE
    description: relative frame counter 2 reload interrupt enable This bit enables the relative frame counter 2 reload interrupt generation.
    bit_offset: 13
    bit_size: 1
    enum: RFC2RIE
  - name: EV1IE
    description: event 1 interrupt enable This bit enables the complex event 1 interrupt generation.
    bit_offset: 16
    bit_size: 1
    enum: EV1IE
  - name: EV2IE
    description: event 2 interrupt enable This bit enables the complex event 2 interrupt generation.
    bit_offset: 17
    bit_size: 1
    enum: EV2IE
  - name: EV3IE
    description: event 3 interrupt enable This bit enables the complex event 3 interrupt generation.
    bit_offset: 18
    bit_size: 1
    enum: EV3IE
  - name: EV4IE
    description: event 4 interrupt enable This bit enables the complex event 4 interrupt generation.
    bit_offset: 19
    bit_size: 1
    enum: EV4IE
  - name: WDGAIE
    description: watchdog alarm interrupt enable This bit enables the watchdog alarm interrupt generation.
    bit_offset: 24
    bit_size: 1
    enum: WDGAIE
  - name: WDGPIE
    description: watchdog pre-alarm interrupt enable This bit enables the watchdog pre-alarm interrupt generation.
    bit_offset: 25
    bit_size: 1
    enum: WDGPIE
fieldset/ISR:
  description: GFXTIM interrupt status register.
  fields:
  - name: AFCOF
    description: absolute frame counter overflow flag This bit indicates an overflow occurred on the absolute frame counter.
    bit_offset: 0
    bit_size: 1
    enum: AFCOF
  - name: ALCOF
    description: absolute line counter overflow flag This bit indicates an overflow occurred on the absolute line counter.
    bit_offset: 1
    bit_size: 1
    enum: ALCOF
  - name: TEF
    description: tearing-effect flag This bit indicates a tearing effect event occurred.
    bit_offset: 2
    bit_size: 1
    enum: TEF
  - name: AFCC1F
    description: absolute frame counter compare 1 flag This bit indicates match on compare 1 of the absolute frame counter.
    bit_offset: 4
    bit_size: 1
    enum: AFCC1F
  - name: ALCC1F
    description: absolute line counter compare 1 flag This bit indicates match on compare 1 of the absolute line counter.
    bit_offset: 8
    bit_size: 1
    enum: ALCC1F
  - name: ALCC2F
    description: absolute line counter compare 2 flag This bit indicates match on compare 2 of the absolute line counter.
    bit_offset: 9
    bit_size: 1
    enum: ALCC2F
  - name: RFC1RF
    description: relative frame counter 1 reload flag This bit indicates relative frame counter 1 has been reloaded.
    bit_offset: 12
    bit_size: 1
    enum: RFC1RF
  - name: RFC2RF
    description: relative frame counter 2 reload flag This bit indicates relative frame counter 2 has been reloaded.
    bit_offset: 13
    bit_size: 1
    enum: RFC2RF
  - name: EV1F
    description: event 1 flag This bit indicates a complex event 1 occurred.
    bit_offset: 16
    bit_size: 1
    enum: EV1F
  - name: EV2F
    description: event 2 flag This bit indicates a complex event 2 occurred.
    bit_offset: 17
    bit_size: 1
    enum: EV2F
  - name: EV3F
    description: event 3 flag This bit indicates a complex event 3 occurred.
    bit_offset: 18
    bit_size: 1
    enum: EV3F
  - name: EV4F
    description: event 4 flag This bit indicates a complex event 4 occurred.
    bit_offset: 19
    bit_size: 1
    enum: EV4F
  - name: WDGAF
    description: watchdog alarm flag This bit indicates that a graphic watchdog alarm occurred.
    bit_offset: 24
    bit_size: 1
    enum: WDGAF
  - name: WDGPF
    description: watchdog pre-alarm flag This bit indicates that a graphic watchdog pre-alarm occurred.
    bit_offset: 25
    bit_size: 1
    enum: WDGPF
fieldset/LCCRR:
  description: GFXTIM line clock counter reload register.
  fields:
  - name: RELOAD
    description: reload value Reload value of the line clock counter.
