    bit_size: 22
fieldset/RFC1R:
  description: GFXTIM relative frame counter 1 register.
  fields:
  - name: FRAME
    description: frame number Current value of the relative frame counter 1.
    bit_offset: 0
    bit_size: 12
fieldset/RFC1RR:
  description: GFXTIM relative frame counter 1 reload register.
  fields:
  - name: FRAME
    description: frame reload value Reload value for the relative frame counter 1.
    bit_offset: 0
    bit_size: 12
fieldset/RFC2R:
  description: GFXTIM relative frame counter 2 register.
  fields:
  - name: FRAME
    description: frame number Current value of the relative frame counter 2.
    bit_offset: 0
    bit_size: 12
fieldset/RFC2RR:
  description: GFXTIM relative frame counter 2 reload register.
  fields:
  - name: FRAME
    description: frame reload value Reload value for the relative frame counter 2.
    bit_offset: 0
    bit_size: 12
fieldset/TCR:
  description: GFXTIM timers configuration register.
  fields:
  - name: AFCEN
    description: absolute frame counter enable This bit enables the absolute frame counter.
    bit_offset: 0
    bit_size: 1
    enum: AFCEN
  - name: FAFCR
    description: force absolute frame counter reset This bit forces the reset of the absolute frame counter.
    bit_offset: 1
    bit_size: 1
    enum: FAFCR
  - name: ALCEN
    description: absolute line counter enable This bit enables the absolute line counter.
    bit_offset: 4
    bit_size: 1
    enum: ALCEN
  - name: FALCR
    description: force absolute line counter reset This bit forces the reset of the absolute line counter.
    bit_offset: 5
    bit_size: 1
    enum: FALCR
  - name: RFC1EN
    description: relative frame counter 1 enable This bit enables the relative frame counter 1.
    bit_offset: 16
    bit_size: 1
    enum: RFC1EN
  - name: RFC1CM
    description: relative frame counter 1 continuous mode This bit enables the continuous mode of the relative frame counter 1.
    bit_offset: 17
    bit_size: 1
    enum: RFC1CM
  - name: FRFC1R
    description: force relative frame counter 1 reload This bit forces the reload of the relative frame counter 1.
    bit_offset: 18
    bit_size: 1
    enum: FRFC1R
  - name: RFC2EN
    description: relative frame counter 2 enable This bit enables the relative frame counter 2.
    bit_offset: 20
    bit_size: 1
    enum: RFC2EN
  - name: RFC2CM
    description: relative frame counter 2 continuous mode This bit enables the continuous mode of the relative frame counter 2.
    bit_offset: 21
    bit_size: 1
    enum: RFC2CM
  - name: FRFC2R
    description: force relative frame counter 2 reload This bit forces the reload of the relative frame counter 2.
    bit_offset: 22
    bit_size: 1
    enum: FRFC2R
