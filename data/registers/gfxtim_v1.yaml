    bit_offset: 2
    bit_size: 1
  - name: AFCC1IE
    description: absolute frame counter compare 1 interrupt enable This bit enables the absolute frame counter compare interrupt generation.
    bit_offset: 4
    bit_size: 1
  - name: ALCC1IE
    description: absolute line counter compare 1 interrupt enable This bit enables the absolute line counter compare 1 interrupt generation.
    bit_offset: 8
    bit_size: 1
  - name: ALCC2IE
    description: absolute line counter compare 2 interrupt enable This bit enables the absolute line counter compare 2 interrupt generation.
    bit_offset: 9
    bit_size: 1
  - name: RFC1RIE
    description: relative frame counter 1 reload interrupt enable This bit enables the relative frame counter 1 reload interrupt generation.
    bit_offset: 12
    bit_size: 1
  - name: RFC2RIE
    description: relative frame counter 2 reload interrupt enable This bit enables the relative frame counter 2 reload interrupt generation.
    bit_offset: 13
    bit_size: 1
  - name: EV1IE
    description: event 1 interrupt enable This bit enables the complex event 1 interrupt generation.
    bit_offset: 16
    bit_size: 1
  - name: EV2IE
    description: event 2 interrupt enable This bit enables the complex event 2 interrupt generation.
    bit_offset: 17
    bit_size: 1
  - name: EV3IE
    description: event 3 interrupt enable This bit enables the complex event 3 interrupt generation.
    bit_offset: 18
    bit_size: 1
  - name: EV4IE
    description: event 4 interrupt enable This bit enables the complex event 4 interrupt generation.
    bit_offset: 19
    bit_size: 1
  - name: WDGAIE
    description: watchdog alarm interrupt enable This bit enables the watchdog alarm interrupt generation.
    bit_offset: 24
    bit_size: 1
  - name: WDGPIE
    description: watchdog pre-alarm interrupt enable This bit enables the watchdog pre-alarm interrupt generation.
    bit_offset: 25
    bit_size: 1
fieldset/ISR:
  description: GFXTIM interrupt status register.
  fields:
  - name: AFCOF
    description: absolute frame counter overflow flag This bit indicates an overflow occurred on the absolute frame counter.
    bit_offset: 0
    bit_size: 1
  - name: ALCOF
    description: absolute line counter overflow flag This bit indicates an overflow occurred on the absolute line counter.
    bit_offset: 1
    bit_size: 1
  - name: TEF
    description: tearing-effect flag This bit indicates a tearing effect event occurred.
    bit_offset: 2
    bit_size: 1
  - name: AFCC1F
    description: absolute frame counter compare 1 flag This bit indicates match on compare 1 of the absolute frame counter.
    bit_offset: 4
    bit_size: 1
  - name: ALCC1F
    description: absolute line counter compare 1 flag This bit indicates match on compare 1 of the absolute line counter.
    bit_offset: 8
    bit_size: 1
  - name: ALCC2F
    description: absolute line counter compare 2 flag This bit indicates match on compare 2 of the absolute line counter.
    bit_offset: 9
    bit_size: 1
  - name: RFC1RF
    description: relative frame counter 1 reload flag This bit indicates relative frame counter 1 has been reloaded.
    bit_offset: 12
    bit_size: 1
  - name: RFC2RF
    description: relative frame counter 2 reload flag This bit indicates relative frame counter 2 has been reloaded.
    bit_offset: 13
    bit_size: 1
  - name: EV1F
    description: event 1 flag This bit indicates a complex event 1 occurred.
    bit_offset: 16
    bit_size: 1
  - name: EV2F
    description: event 2 flag This bit indicates a complex event 2 occurred.
    bit_offset: 17
    bit_size: 1
  - name: EV3F
    description: event 3 flag This bit indicates a complex event 3 occurred.
    bit_offset: 18
    bit_size: 1
  - name: EV4F
    description: event 4 flag This bit indicates a complex event 4 occurred.
    bit_offset: 19
    bit_size: 1
  - name: WDGAF
    description: watchdog alarm flag This bit indicates that a graphic watchdog alarm occurred.
    bit_offset: 24
    bit_size: 1
  - name: WDGPF
    description: watchdog pre-alarm flag This bit indicates that a graphic watchdog pre-alarm occurred.
    bit_offset: 25
    bit_size: 1
