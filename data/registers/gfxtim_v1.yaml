  fields:
  - name: LES1
    description: 'line-event selection 1 This field defines the line-event selection for complex event 1 generation. others: reserved.'
    bit_offset: 0
    bit_size: 3
    enum: LES1
  - name: FES1
    description: 'frame-event selection 1 This field defines the frame-event selection for complex event 1 generation. others: reserved.'
    bit_offset: 4
    bit_size: 3
    enum: FES1
  - name: LES2
    description: 'line-event selection 2 This field defines the line-event selection for complex event 2 generation. others: reserved.'
    bit_offset: 8
    bit_size: 3
    enum: LES2
  - name: FES2
    description: 'frame-event selection 2 This field defines the frame-event selection for complex event 2 generation. others: reserved.'
    bit_offset: 12
    bit_size: 3
    enum: FES2
  - name: LES3
    description: 'line-event selection 3 This field defines the line-event selection for complex event 3 generation. others: reserved.'
    bit_offset: 16
    bit_size: 3
    enum: LES3
  - name: FES3
    description: 'frame-event selection 3 This field defines the frame-event selection for complex event 3 generation. others: reserved.'
    bit_offset: 20
    bit_size: 3
    enum: FES3
  - name: LES4
    description: 'line-event selection 4 This field defines the line-event selection for complex event 4 generation. others: Reserved.'
    bit_offset: 24
    bit_size: 3
    enum: LES4
  - name: FES4
    description: 'frame-event selection 4 This field defines the frame-event selection for complex event 4 generation. others: reserved.'
    bit_offset: 28
    bit_size: 3
    enum: FES4
fieldset/FCCRR:
  description: GFXTIM frame clock counter reload register.
  fields:
  - name: RELOAD
    description: reload value Reload value of the frame clock counter.
    bit_offset: 0
    bit_size: 12
fieldset/ICR:
  description: GFXTIM interrupt clear register.
  fields:
  - name: CAFCOF
    description: clear absolute frame counter overflow flag This bit clears AFCOF in GXTIM_ISR.
    bit_offset: 0
    bit_size: 1
  - name: CALCOF
    description: clear absolute line counter overflow flag This bit clears ALCOF in GXTIM_ISR.
    bit_offset: 1
    bit_size: 1
  - name: CTEF
    description: clear tearing-effect flag This bit clears TEF in GXTIM_ISR.
    bit_offset: 2
    bit_size: 1
  - name: CAFCC1F
    description: clear absolute frame counter compare 1 flag This bit clears AFCC1F in GXTIM_ISR.
    bit_offset: 4
    bit_size: 1
  - name: CALCC1F
    description: clear absolute line counter compare 1 flag This bit clears ALCC1F in GXTIM_ISR.
    bit_offset: 8
    bit_size: 1
  - name: CALCC2F
    description: clear absolute line counter compare 2 flag This bit clears ALCC2F in GXTIM_ISR.
    bit_offset: 9
    bit_size: 1
  - name: CRFC1RF
    description: clear relative frame counter 1 reload flag This bit clears RFC1RF in GXTIM_ISR.
    bit_offset: 12
    bit_size: 1
  - name: CRFC2RF
    description: clear relative frame counter 2 reload flag This bit clears RFC2RF in GXFXTIM_ISR.
    bit_offset: 13
    bit_size: 1
  - name: CEV1F
    description: clear event 1 flag This bit EV1F in GXFXTIM_ISR.
    bit_offset: 16
    bit_size: 1
  - name: CEV2F
    description: clear event 2 flag This bit clears EV2F in GXFXTIM_ISR.
    bit_offset: 17
    bit_size: 1
  - name: CEV3F
    description: clear event 3 flag This bit clears EV3F in GXFXTIM_ISR.
    bit_offset: 18
    bit_size: 1
  - name: CEV4F
    description: clear event 4 flag This bit clears EV4F in GXFXTIM_ISR.
    bit_offset: 19
    bit_size: 1
  - name: CWDGAF
    description: clear watchdog alarm flag This bit clears WDGAF in GXFXTIM_ISR.
    bit_offset: 24
    bit_size: 1
  - name: CWDGPF
    description: clear watchdog pre-alarm flag This bit clears WDGPF in GXFXTIM_ISR.
    bit_offset: 25
    bit_size: 1
fieldset/IER:
