  description: GFXTIM watchdog counter register.
  fields:
  - name: VALUE
    description: value Current value of the watchdog counter.
    bit_offset: 0
    bit_size: 16
fieldset/WDGPAR:
  description: GFXTIM watchdog pre-alarm register.
