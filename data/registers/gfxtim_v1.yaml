    description: GFXTIM watchdog reload register.
    byte_offset: 164
    fieldset: WDGRR
  - name: WDGPAR
    description: GFXTIM watchdog pre-alarm register.
    byte_offset: 168
    fieldset: WDGPAR
fieldset/AFCC1R:
  description: GFXTIM absolute frame counter compare 1 register.
  fields:
  - name: FRAME
    description: frame number Compare 1 value for the absolute frame counter.
    bit_offset: 0
    bit_size: 20
fieldset/AFCR:
  description: GFXTIM absolute frame counter register.
  fields:
  - name: FRAME
    description: 'frame number Current value of the absolute frame counter. Note: This field can only be written when the absolute frame counter is disabled.'
    bit_offset: 0
    bit_size: 20
fieldset/ALCC1R:
  description: GFXTIM absolute line counter compare 1 register.
  fields:
  - name: LINE
    description: line number Compare value 1 for the absolute line counter.
    bit_offset: 0
    bit_size: 12
fieldset/ALCC2R:
  description: GFXTIM absolute line counter compare 2 register.
  fields:
  - name: LINE
    description: line number Compare value 2 for the absolute line counter.
    bit_offset: 0
    bit_size: 12
fieldset/ALCR:
  description: GFXTIM absolute line counter register.
  fields:
  - name: LINE
    description: 'line number Current value of the absolute line counter. Note: This field can only be written when the absolute frame counter is disabled.'
    bit_offset: 0
    bit_size: 12
fieldset/ATR:
  description: GFXTIM absolute time register.
  fields:
  - name: LINE
    description: line number Current value of the absolute line counter.
    bit_offset: 0
    bit_size: 12
  - name: FRAME
    description: fame number Current value of the absolute frame counter.
    bit_offset: 12
    bit_size: 20
fieldset/CGCR:
  description: GFXTIM clock generator configuration register.
  fields:
  - name: LCS
    description: line clock source This field configures the line clock source.
    bit_offset: 0
    bit_size: 3
    enum: LCS
  - name: LCCCS
    description: line clock counter clock source This bit configures the clock source for the line clock counter.
    bit_offset: 4
    bit_size: 1
    enum: LCCCS
  - name: LCCFR
    description: line clock counter force reload This bit forces line clock counter reload.
    bit_offset: 8
    bit_size: 1
    enum: LCCFR
  - name: LCCHRS
    description: line clock counter hardware reload source This field configures the hardware reload source for the line clock counter.
    bit_offset: 12
    bit_size: 3
    enum: LCCHRS
  - name: FCS
    description: frame clock source This field configures the frame clock source.
    bit_offset: 16
    bit_size: 3
    enum: FCS
  - name: FCCCS
    description: frame clock counter clock source This field configures the clock source for the frame clock counter.
    bit_offset: 20
    bit_size: 3
    enum: FCCCS
  - name: FCCFR
    description: frame clock counter force reload This bit forces frame clock counter reload.
    bit_offset: 24
    bit_size: 1
    enum: FCCFR
  - name: FCCHRS
    description: frame- -clock counter hardware reload source This field configures the hardware reload source for the frame- -clock counter.
    bit_offset: 28
    bit_size: 3
    enum: FCCHRS
fieldset/CR:
  description: GFXTIM configuration register.
  fields:
  - name: TES
    description: tearing source This field selects the tearing-effect source.
    bit_offset: 0
    bit_size: 2
    enum: TES
  - name: TEPOL
    description: tearing--effect polarity This bit selects the tearing-effect polarity.
    bit_offset: 4
    bit_size: 1
    enum: TEPOL
  - name: SYNCS
    description: synchronization source This field selects the synchronization signals (HSYNC and VSYNC) sources.
    bit_offset: 8
    bit_size: 2
    enum: SYNCS
  - name: FCCOE
    description: frame-clock calibration output enable This bit enables the frame-clock output.
    bit_offset: 16
    bit_size: 1
    enum: FCCOE
  - name: LCCOE
    description: line-clock calibration output enable This bit enables the line-clock output.
    bit_offset: 17
    bit_size: 1
    enum: LCCOE
fieldset/EVCR:
  description: GFXTIM events control register.
  fields:
  - name: EV1EN
    description: event 1 enable This bit enables the complex event 1 generation.
    bit_offset: 0
    bit_size: 1
    enum: EV1EN
  - name: EV2EN
    description: event 2 enable This bit enables the complex event 2 generation.
    bit_offset: 1
    bit_size: 1
    enum: EV2EN
  - name: EV3EN
    description: event 3 enable This bit enables the complex event 3 generation.
    bit_offset: 2
    bit_size: 1
    enum: EV3EN
  - name: EV4EN
    description: event 4 enable This bit enables the complex event 4 generation.
    bit_offset: 3
    bit_size: 1
    enum: EV4EN
fieldset/EVSR:
