enum/AFCC1F:
  bit_size: 1
  variants:
  - name: B_0x0
    description: no match occurred on compare 1 of the absolute frame counter.
    value: 0
  - name: B_0x1
    description: a match on compare 1 of the absolute frame counter occurred.
    value: 1
enum/AFCC1IE:
  bit_size: 1
  variants:
  - name: B_0x0
    description: absolute frame counter compare 1 interrupt disabled.
    value: 0
  - name: B_0x1
    description: absolute frame counter compare 1 interrupt enabled.
    value: 1
enum/AFCDIS:
  bit_size: 1
  variants:
  - name: B_0x0
    description: no effect.
    value: 0
  - name: B_0x1
    description: absolute frame counter disabled.
    value: 1
enum/AFCEN:
  bit_size: 1
  variants:
  - name: B_0x0
    description: no effect.
    value: 0
  - name: B_0x1
    description: absolute frame counter enabled.
    value: 1
enum/AFCOF:
  bit_size: 1
  variants:
  - name: B_0x0
    description: no overflow occurred on the absolute frame counter.
    value: 0
  - name: B_0x1
    description: a overflow on the absolute frame counter occurred.
    value: 1
enum/AFCOIE:
  bit_size: 1
  variants:
  - name: B_0x0
    description: absolute frame counter overflow interrupt disabled.
    value: 0
  - name: B_0x1
    description: absolute frame counter overflow interrupt enabled.
    value: 1
enum/AFCS:
  bit_size: 1
  variants:
  - name: B_0x0
    description: absolute frame counter disabled.
    value: 0
  - name: B_0x1
    description: absolute frame counter enabled.
    value: 1
enum/ALCC1F:
  bit_size: 1
  variants:
  - name: B_0x0
    description: no match occurred on compare 1 of the absolute line counter.
    value: 0
  - name: B_0x1
    description: a match on compare 1 of the absolute line counter occurred.
    value: 1
enum/ALCC1IE:
  bit_size: 1
  variants:
  - name: B_0x0
    description: absolute line counter compare 1 interrupt disabled.
    value: 0
  - name: B_0x1
