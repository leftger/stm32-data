  fields:
  - name: AFCDIS
    description: absolute frame counter disable This bit disables the absolute frame counter.
    bit_offset: 0
    bit_size: 1
    enum: AFCDIS
  - name: ALCDIS
    description: absolute line counter disable This bit disables the absolute line counter.
    bit_offset: 4
    bit_size: 1
    enum: ALCDIS
  - name: RFC1DIS
    description: relative frame counter 1 disable This bit disables the relative frame counter 1.
    bit_offset: 16
    bit_size: 1
    enum: RFC1DIS
  - name: RFC2DIS
    description: relative frame counter 2 disable This bit disables the relative frame counter 2.
    bit_offset: 20
    bit_size: 1
    enum: RFC2DIS
