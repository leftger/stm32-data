    description: Message type (whatever I3C acts as controller/target).
    bit_offset: 27
    bit_size: 4
  - name: MEND
    description: Message end type / last message of a frame (when the I3C acts as controller).
    bit_offset: 31
    bit_size: 1
fieldset/CRCAPR:
