block/SAES:
  description: Secure AES coprocessor.
  items:
  - name: CR
    description: SAES control register.
    byte_offset: 0
    fieldset: CR
  - name: SR
    description: SAES status register.
    byte_offset: 4
    fieldset: SR
  - name: DINR
    description: SAES data input register.
    byte_offset: 8
  - name: DOUTR
    description: SAES data output register.
    byte_offset: 12
  - name: KEYR
    description: SAES key registers.
    array:
      offsets:
      - 0
      - 4
      - 8
      - 12
      - 32
      - 36
      - 40
      - 44
    byte_offset: 16
  - name: IVR
    description: SAES initialization vector registers.
    array:
      len: 4
      stride: 4
    byte_offset: 32
  - name: SUSPR
    description: SAES suspend registers.
    array:
      len: 8
      stride: 4
    byte_offset: 64
  - name: IER
    description: SAES interrupt enable register.
    byte_offset: 768
    fieldset: IER
  - name: ISR
    description: SAES interrupt status register.
    byte_offset: 772
    fieldset: ISR
  - name: ICR
    description: SAES interrupt clear register.
    byte_offset: 776
    fieldset: ICR
fieldset/CR:
  description: SAES control register.
  fields:
  - name: EN
    description: Enable.
    bit_offset: 0
    bit_size: 1
  - name: DATATYPE
    description: Data type.
    bit_offset: 1
    bit_size: 2
  - name: MODE
    description: Operating mode.
    bit_offset: 3
    bit_size: 2
  - name: CHMOD
    description: 'CHMOD[1:0]: Chaining mode.'
    bit_offset: 5
    bit_size: 2
  - name: DMAINEN
    description: DMA input enable.
    bit_offset: 11
    bit_size: 1
  - name: DMAOUTEN
    description: DMA output enable.
    bit_offset: 12
    bit_size: 1
  - name: GCMPH
    description: GCM or CCM phase selection.
    bit_offset: 13
    bit_size: 2
  - name: CHMOD_1
    description: CHMOD[2].
    bit_offset: 16
    bit_size: 1
  - name: KEYSIZE
    description: Key size selection.
    bit_offset: 18
    bit_size: 1
  - name: KEYPROT
    description: Key protection.
    bit_offset: 19
    bit_size: 1
  - name: NPBLB
    description: Number of padding bytes in last block.
    bit_offset: 20
    bit_size: 4
  - name: KMOD
    description: Key mode selection.
    bit_offset: 24
    bit_size: 2
  - name: KSHAREID
    description: Key share identification.
    bit_offset: 26
    bit_size: 2
  - name: KEYSEL
    description: Key selection.
    bit_offset: 28
    bit_size: 3
  - name: IPRST
    description: SAES peripheral software reset.
    bit_offset: 31
    bit_size: 1
fieldset/ICR:
  description: SAES interrupt clear register.
  fields:
  - name: CCF
    description: Computation complete flag clear.
    bit_offset: 0
    bit_size: 1
  - name: RWEIF
    description: Read or write error interrupt flag clear.
    bit_offset: 1
    bit_size: 1
  - name: KEIF
    description: Key error interrupt flag clear.
    bit_offset: 2
    bit_size: 1
  - name: RNGEIF
    description: RNG error interrupt flag clear.
    bit_offset: 3
    bit_size: 1
fieldset/IER:
  description: SAES interrupt enable register.
  fields:
  - name: CCFIE
    description: Computation complete flag interrupt enable.
    bit_offset: 0
    bit_size: 1
  - name: RWEIE
    description: Read or write error interrupt enable.
    bit_offset: 1
    bit_size: 1
  - name: KEIE
    description: Key error interrupt enable.
    bit_offset: 2
    bit_size: 1
  - name: RNGEIE
    description: RNG error interrupt enable.
    bit_offset: 3
    bit_size: 1
fieldset/ISR:
  description: SAES interrupt status register.
  fields:
  - name: CCF
    description: Computation complete flag.
    bit_offset: 0
    bit_size: 1
  - name: RWEIF
    description: Read or write error interrupt flag.
    bit_offset: 1
    bit_size: 1
  - name: KEIF
    description: Key error interrupt flag.
    bit_offset: 2
    bit_size: 1
  - name: RNGEIF
    description: RNG error interrupt flag.
    bit_offset: 3
    bit_size: 1
fieldset/SR:
  description: SAES status register.
  fields:
  - name: RDERRF
    description: Read error flag.
    bit_offset: 1
    bit_size: 1
  - name: WRERRF
    description: Write error flag.
    bit_offset: 2
    bit_size: 1
  - name: BUSY
    description: Busy.
    bit_offset: 3
    bit_size: 1
  - name: KEYVALID
    description: Key valid flag.
    bit_offset: 7
    bit_size: 1
