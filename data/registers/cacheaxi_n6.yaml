    description: CACHEAXI command range start address register.
    byte_offset: 260
    fieldset: CMDRSADDRR
  - name: CMDREADDRR
    description: CACHEAXI command range end address register.
    byte_offset: 264
    fieldset: CMDREADDRR
fieldset/CMDREADDRR:
  description: CACHEAXI command range end address register.
  fields:
  - name: CMDENDADDR
    description: end address of range to which the cache maintenance command specified in CACHEAXI_CR2.CACHECMD field applies.
    bit_offset: 6
    bit_size: 26
fieldset/CMDRSADDRR:
  description: CACHEAXI command range start address register.
  fields:
  - name: CMDSTARTADDR
    description: start address of range to which the cache maintenance command specified in CACHEAXI_CR2.CACHECMD field applies.
    bit_offset: 6
    bit_size: 26
