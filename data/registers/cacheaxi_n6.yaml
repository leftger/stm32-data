    bit_offset: 18
    bit_size: 1
  - name: RMISSMRST
    description: read-miss monitor reset.
    bit_offset: 19
    bit_size: 1
  - name: WHITMEN
    description: write-hit monitor enable.
    bit_offset: 20
    bit_size: 1
  - name: WMISSMEN
    description: write-miss monitor enable.
    bit_offset: 21
    bit_size: 1
  - name: WHITMRST
    description: write-hit monitor reset.
    bit_offset: 22
    bit_size: 1
