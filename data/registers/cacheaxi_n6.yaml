  fields:
  - name: EN
    description: enable.
    bit_offset: 0
    bit_size: 1
  - name: CACHEINV
    description: full cache invalidation.
    bit_offset: 1
    bit_size: 1
  - name: RHITMEN
    description: read-hit monitor enable.
    bit_offset: 16
    bit_size: 1
  - name: RMISSMEN
    description: read-miss monitor enable.
    bit_offset: 17
    bit_size: 1
