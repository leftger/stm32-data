    description: eviction monitor reset.
    bit_offset: 31
    bit_size: 1
fieldset/CR2:
  description: CACHEAXI control register 2.
  fields:
  - name: STARTCMD
    description: starts maintenance range command (maintenance operation defined in CACHECMD).
    bit_offset: 0
    bit_size: 1
  - name: CACHECMD
    description: cache command maintenance operation (clean or clean-and-invalidate an address range).
    bit_offset: 1
    bit_size: 2
    enum: CACHECMD
fieldset/EVIMONR:
  description: CACHEAXI eviction monitor register.
  fields:
  - name: EVIMON
    description: cache eviction monitor counter.
    bit_offset: 0
    bit_size: 32
fieldset/FCR:
  description: CACHEAXI flag clear register.
  fields:
  - name: CBSYENDF
    description: clear full invalidate busy end flag.
    bit_offset: 1
    bit_size: 1
  - name: CERRF
    description: clear cache error flag.
    bit_offset: 2
    bit_size: 1
  - name: CCMDENDF
    description: clear command end flag.
    bit_offset: 4
    bit_size: 1
fieldset/IER:
  description: CACHEAXI interrupt enable register.
  fields:
  - name: BSYENDIE
    description: interrupt enable on busy end.
    bit_offset: 1
    bit_size: 1
  - name: ERRIE
    description: interrupt enable on cache error.
    bit_offset: 2
    bit_size: 1
  - name: CMDENDIE
    description: interrupt enable on command end.
    bit_offset: 4
    bit_size: 1
fieldset/RAMMONR:
  description: CACHEAXI read-allocate miss monitor register.
  fields:
  - name: RAMMON
    description: cache read-allocate miss monitor counter.
    bit_offset: 0
    bit_size: 32
fieldset/RHMONR:
  description: CACHEAXI read-hit monitor register.
  fields:
  - name: RHITMON
    description: cache read-hit monitor counter.
    bit_offset: 0
    bit_size: 32
fieldset/RMMONR:
  description: CACHEAXI read-miss monitor register.
  fields:
  - name: RMISSMON
    description: cache read-miss monitor counter.
    bit_offset: 0
    bit_size: 32
fieldset/SR:
  description: CACHEAXI status register.
  fields:
  - name: BUSYF
    description: full invalidate busy flag.
    bit_offset: 0
    bit_size: 1
  - name: BSYENDF
    description: full invalidate busy end flag.
    bit_offset: 1
    bit_size: 1
  - name: ERRF
    description: cache error flag.
    bit_offset: 2
    bit_size: 1
  - name: BUSYCMDF
    description: command busy flag.
    bit_offset: 3
    bit_size: 1
  - name: CMDENDF
    description: command end flag.
    bit_offset: 4
    bit_size: 1
fieldset/WAMMONR:
  description: CACHEAXI write-allocate miss monitor register.
  fields:
  - name: WAMMON
    description: cache write-allocate miss monitor counter.
    bit_offset: 0
    bit_size: 32
fieldset/WHMONR:
  description: CACHEAXI write-hit monitor register.
  fields:
  - name: WHITMON
    description: cache write-hit monitor counter.
    bit_offset: 0
    bit_size: 32
fieldset/WMMONR:
  description: CACHEAXI write-miss monitor register.
  fields:
  - name: WMISSMON
    description: cache write-miss monitor counter.
    bit_offset: 0
    bit_size: 32
fieldset/WTMONR:
  description: CACHEAXI write-through monitor register.
  fields:
  - name: WTMON
    description: cache write-through monitor counter.
    bit_offset: 0
    bit_size: 32
enum/CACHECMD:
  bit_size: 2
  variants:
  - name: B_0x0
    description: no operation.
    value: 0
  - name: B_0x1
    description: clean range.
    value: 1
  - name: B_0x3
    description: clean and invalidate range.
    value: 3
